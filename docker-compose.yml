services:
  frenchlegacy-bridge-chat:
    container_name: frenchlegacy-bridge-chat
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./config/settings.json:/app/config/settings.json:ro
      - bridge_data:/app/data
    environment:
      - TZ=Europe/Paris
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    labels:
      - "user.frenchlegacy=allowed"

volumes:
  bridge_data:
    driver: local
